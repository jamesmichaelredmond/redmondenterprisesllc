    <path id="roof" d="M-170 -10 L0 -170 L170 -10" fill="none" stroke="#047857" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Left wall -->
    <line id="wall-left" x1="-120" y1="10" x2="-120" y2="155" stroke="#047857" stroke-width="28" stroke-linecap="round" />
    <!-- Right wall -->
