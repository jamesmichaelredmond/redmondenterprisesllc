    <!-- 3 ruler ticks in amber -->
    <line id="inkp-75" x1="-55" y1="155" x2="-55" y2="70" stroke="#D97706" stroke-width="28" stroke-linecap="round" />
    <line id="inkp-76" x1="0" y1="155" x2="0" y2="35" stroke="#D97706" stroke-width="28" stroke-linecap="round" />
    <line id="inkp-77" x1="55" y1="155" x2="55" y2="70" stroke="#D97706" stroke-width="28" stroke-linecap="round" />
  </g>
